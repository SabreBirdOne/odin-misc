<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="#">
    <script>
        const img = document.querySelector('img');
        img.alt = "Cat gif from GIPHY"
        fetch('https://api.giphy.com/v1/gifs/translate?api_key=dS5ZmVPi3m92RBK2WDSQoL2Tk6mElHcX&s=cats')
        .then(function(response){
            return response.json();
        }).then(function(promise){
            img.src = promise.data.images.original.url;
        })
    </script>
</body>
</html>
